<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 100">
  <defs>
    <style>
      .logo-accent { fill: #f97316; }
      .logo-text   { fill: #ffffff; font-family: 'Montserrat', sans-serif; font-weight: 800; font-size: 24px; }
      .logo-sub    { fill: #94a3b8; font-family: 'Montserrat', sans-serif; font-weight: 400; font-size: 12px; letter-spacing: 2px; }
    </style>
  </defs>
  <!-- Pictogramme : carré orange avec découpe en forme de bâtiment -->
  <rect x="10" y="25" width="40" height="40" rx="4" class="logo-accent"/>
  <path d="M20 55 L20 35 L30 35 L30 45 L40 45 L40 55 Z" fill="#0f172a"/>
  <!-- Texte -->
  <text transform="matrix(1 0 0 1 65 52)" class="logo-text">BOSCO</text>
  <text transform="matrix(1 0 0 1 65 70)" class="logo-sub">CONSTRUCTION GROUP</text>
</svg>
